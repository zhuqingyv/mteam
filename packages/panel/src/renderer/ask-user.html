<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Ask User</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      }
      #root {
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 1;
      }
      #border-canvas {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }
      #tentacle-canvas {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="border-canvas"></canvas>
    <div id="root"></div>
    <canvas id="tentacle-canvas"></canvas>
    <script type="module" src="./ask-user.tsx"></script>
  </body>
</html>
