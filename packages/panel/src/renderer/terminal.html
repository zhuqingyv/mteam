<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Terminal</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
      body { display: flex; flex-direction: column; padding: 8px; }
      #titlebar {
        position: relative;
        z-index: 10;
        height: 32px;
        flex-shrink: 0;
        padding: 0 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #1a1a1a;
        border-radius: 8px 8px 0 0;
        -webkit-app-region: drag;
        user-select: none;
      }
      #titlebar-label {
        font: bold 12px 'SF Mono', 'Menlo', monospace;
        color: #888;
      }
      #titlebar-controls {
        display: flex;
        -webkit-app-region: no-drag;
      }
      #btn-close {
        width: 24px;
        height: 24px;
        border: none;
        background: transparent;
        color: #666;
        font-size: 14px;
        cursor: pointer;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #btn-close:hover {
        background: #e81123;
        color: #fff;
      }
      #border-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
      }
      #terminal {
        position: relative;
        z-index: 1;
        flex: 1;
        min-height: 0;
        background: #0d0d0d;
        border-radius: 0 0 8px 8px;
        padding: 8px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Title bar -->
    <div id="titlebar">
      <span id="titlebar-label">成员</span>
      <div id="titlebar-controls">
        <button id="btn-close" title="关闭">&#x2715;</button>
      </div>
    </div>
    <!-- Liquid border canvas -->
    <canvas id="border-canvas"></canvas>
    <!-- Terminal container -->
    <div id="terminal"></div>
    <script type="module" src="./terminal-border.ts"></script>
    <script type="module" src="./terminal-renderer.ts"></script>
  </body>
</html>
